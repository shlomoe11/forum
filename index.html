<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wow פורום</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --blue:#0059a9;--blue-light:#e8f0f9;--blue-dark:#003d7a;
  --red:#c0392b;--green:#27ae60;--orange:#e67e22;
  --gray-50:#f7f9fb;--gray-100:#f0f2f5;--gray-200:#e1e4e8;
  --gray-300:#c9cdd4;--gray-400:#9aa0a8;--gray-500:#6b7280;
  --gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;
  --white:#ffffff;
  --shadow-sm:0 1px 3px rgba(0,0,0,.07);--shadow:0 2px 8px rgba(0,0,0,.1);
  --radius:6px;--font:'Heebo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-800);min-height:100vh;font-size:15px}
a{color:var(--blue);text-decoration:none}
button{font-family:var(--font);cursor:pointer}
input,textarea,select{font-family:var(--font)}
svg{display:inline-block;vertical-align:middle;flex-shrink:0}
.app{display:flex;min-height:100vh}
.sidebar{width:60px;background:var(--white);border-left:1px solid var(--gray-200);display:flex;flex-direction:column;align-items:center;padding-top:16px;gap:6px;position:sticky;top:0;height:100vh;z-index:100;flex-shrink:0}
.sidebar-left{border-left:none;border-right:1px solid var(--gray-200)}
.sidebar-btn{width:44px;height:44px;border-radius:10px;border:none;background:none;color:var(--gray-500);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,color .15s;position:relative}
.sidebar-btn:hover,.sidebar-btn.active{background:var(--blue-light);color:var(--blue)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:16px}
.topbar-logo{font-size:22px;font-weight:900;color:var(--blue);cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
.topbar-logo span{color:var(--gray-700)}
.topbar-search{position:relative;flex:0 0 300px}
.topbar-search input{width:100%;padding:7px 36px 7px 12px;border:1px solid var(--gray-200);border-radius:20px;background:var(--gray-50);font-size:14px;outline:none;transition:border .15s}
.topbar-search input:focus{border-color:var(--blue);background:var(--white)}
.topbar-search .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray-400)}
.topbar-actions{display:flex;align-items:center;gap:10px}
.btn{padding:7px 16px;border-radius:var(--radius);border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-200)}
.btn-secondary:hover{background:var(--gray-200)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#a93226}
.btn-sm{padding:4px 10px;font-size:13px}
.btn-ghost{background:none;border:1px solid var(--gray-200);color:var(--gray-600)}
.btn-ghost:hover{background:var(--gray-50)}
.page{display:none;flex:1;padding:24px;flex-direction:column;gap:20px}
.page.active{display:flex}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray-500)}
.breadcrumb span{cursor:pointer;color:var(--blue)}
.breadcrumb .sep{color:var(--gray-300);cursor:default}
.banner{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:20px 28px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-sm)}
.banner-title{font-size:18px;font-weight:700;color:var(--gray-800)}
.banner-sub{font-size:14px;color:var(--gray-500);margin-top:4px}
.banner-icon{opacity:.7;color:var(--blue)}
.cat-block{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.cat-header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--gray-100)}
.cat-title{font-size:19px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:10px}
.cat-meta{display:flex;align-items:center;gap:16px}
.stat-group{display:flex;gap:4px}
.stat-box{background:var(--gray-50);border:1px solid var(--gray-200);padding:8px 14px;border-radius:var(--radius);text-align:center;min-width:72px}
.stat-num{font-size:16px;font-weight:700;color:var(--gray-700)}
.stat-lbl{font-size:12px;color:var(--gray-400)}
.cat-body{padding:16px 24px}
.forum-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 32px}
.forum-link{display:flex;align-items:center;gap:8px;padding:7px 0;color:var(--gray-700);font-size:14px;font-weight:500;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:color .1s}
.forum-link:hover{color:var(--blue)}
.forum-link-stats{margin-right:auto;font-size:12px;color:var(--gray-400)}
.admin-bar{background:linear-gradient(135deg,#fff9e6,#fff3cc);border:1px solid #f0d060;border-radius:var(--radius);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.admin-bar-title{font-size:13px;font-weight:700;color:#7a5c00}
.admin-badge{background:#f0d060;color:#7a5c00;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;display:flex;align-items:center;gap:4px}
.topics-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--gray-200)}
.topics-table th{background:var(--gray-50);padding:10px 16px;font-size:13px;font-weight:600;color:var(--gray-500);text-align:right;border-bottom:1px solid var(--gray-200)}
.topics-table td{padding:12px 16px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
.topics-table tr:last-child td{border-bottom:none}
.topics-table tr:hover td{background:var(--gray-50)}
.topic-title-cell{display:flex;flex-direction:column;gap:3px}
.topic-title-link{font-weight:600;color:var(--gray-800);cursor:pointer}
.topic-title-link:hover{color:var(--blue)}
.topic-badges{display:flex;gap:4px;flex-wrap:wrap}
.topic-badge{font-size:11px;padding:1px 7px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.badge-pinned{background:#e8f4fd;color:#1a6fa3}
.badge-locked{background:#fdf0e8;color:#c0622b}
.badge-new{background:#e8f9ee;color:#1a6f3f}
.topic-meta{font-size:12px;color:var(--gray-400)}
.topic-stat{text-align:center;font-size:14px;font-weight:600;color:var(--gray-600)}
.topic-last{font-size:12px;color:var(--gray-500)}
/* Forum header with new topic btn */
.forum-header-bar{display:flex;justify-content:space-between;align-items:center;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow-sm)}
/* Posts */
.post{display:flex;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
.post-sidebar{width:160px;min-width:160px;background:var(--gray-50);border-left:1px solid var(--gray-200);padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.post-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;margin-bottom:4px;overflow:hidden}
.post-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.post-username{font-size:14px;font-weight:700;color:var(--blue);cursor:pointer}
.post-username:hover{text-decoration:underline}
.post-role{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;display:flex;align-items:center;gap:3px}
.role-admin{background:#fff0c2;color:#7a5000}
.role-member{background:var(--gray-100);color:var(--gray-500)}
.post-rep{font-size:12px;color:var(--gray-500)}
.post-rep strong{color:var(--gray-700)}
.post-count{font-size:12px;color:var(--gray-400)}
.post-body{flex:1;padding:16px 20px;display:flex;flex-direction:column;gap:10px;min-width:0}
.post-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid var(--gray-100)}
.post-time{font-size:12px;color:var(--gray-400)}
.post-number{font-size:12px;color:var(--gray-300)}
/* Rich text content */
.post-content{font-size:15px;line-height:1.7;color:var(--gray-700);word-break:break-word}
.post-content strong{font-weight:700}
.post-content em{font-style:italic}
.post-content u{text-decoration:underline}
.post-content s{text-decoration:line-through}
.post-content hr{border:none;border-top:2px solid var(--gray-200);margin:12px 0}
.post-content img{max-width:100%;border-radius:4px;margin:6px 0;cursor:pointer}
.post-content .spoiler{background:var(--gray-800);color:var(--gray-800);border-radius:4px;padding:2px 6px;cursor:pointer;transition:color .2s;user-select:none}
.post-content .spoiler.revealed{color:var(--white)}
.post-content .spoiler:hover{color:var(--gray-300)}
.post-deleted{color:var(--gray-400);font-style:italic;font-size:14px;background:var(--gray-50);padding:12px;border-radius:4px;border-right:3px solid var(--gray-300)}
.post-quote{background:var(--gray-50);border-right:3px solid var(--blue);padding:10px 14px;border-radius:4px;margin-bottom:10px;font-size:13px}
.post-quote-author{font-weight:600;color:var(--blue);font-size:12px;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.post-quote-text{color:var(--gray-600);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.post-footer{display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid var(--gray-100);flex-wrap:wrap}
.post-edited{font-size:11px;color:var(--gray-400);font-style:italic;margin-right:auto}
.react-btn{display:flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1px solid var(--gray-200);background:var(--white);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--gray-600)}
.react-btn:hover{border-color:var(--blue);color:var(--blue)}
.react-btn.liked{background:#e8f4fd;border-color:#1a6fa3;color:#1a6fa3}
.react-btn.disliked{background:#fdf0e8;border-color:#c0622b;color:#c0622b}
.action-btn{padding:5px 10px;border:1px solid var(--gray-200);background:none;border-radius:4px;font-size:12px;color:var(--gray-500);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.action-btn:hover{background:var(--gray-50);color:var(--blue)}
/* Editor */
.editor-wrap{border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;background:var(--white)}
.editor-wrap:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,89,169,.1)}
.editor-toolbar{display:flex;align-items:center;gap:2px;padding:6px 8px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);flex-wrap:wrap}
.toolbar-btn{width:30px;height:30px;border:none;background:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray-600);font-size:13px;font-weight:700;transition:background .1s}
.toolbar-btn:hover{background:var(--gray-200);color:var(--blue)}
.toolbar-sep{width:1px;height:20px;background:var(--gray-200);margin:0 4px}
.editor-area{width:100%;min-height:120px;padding:12px;border:none;outline:none;font-size:14px;resize:vertical;font-family:var(--font);line-height:1.6;background:var(--white)}
.editor-footer{padding:6px 10px;background:var(--gray-50);border-top:1px solid var(--gray-200);display:flex;align-items:center;gap:8px}
.img-upload-label{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--gray-200);border-radius:4px;font-size:12px;color:var(--gray-600);cursor:pointer;transition:background .1s}
.img-upload-label:hover{background:var(--gray-200)}
.img-upload-label input{display:none}
.upload-progress{font-size:12px;color:var(--blue)}
/* Reply box */
.reply-box{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm)}
.reply-box-title{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--gray-700);display:flex;align-items:center;gap:6px}
.quote-preview{background:var(--gray-50);border-right:3px solid var(--blue);padding:10px 14px;border-radius:4px;margin-bottom:10px;font-size:13px;display:flex;justify-content:space-between;align-items:flex-start}
.quote-preview-close{background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:16px;padding:0}
.reply-actions{display:flex;justify-content:flex-start;gap:8px;margin-top:10px}
.pagination{display:flex;gap:4px;align-items:center;justify-content:center}
.page-btn{width:36px;height:36px;border-radius:var(--radius);border:1px solid var(--gray-200);background:var(--white);cursor:pointer;font-size:14px;font-weight:600;color:var(--gray-600);transition:all .15s;display:flex;align-items:center;justify-content:center}
.page-btn:hover,.page-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
/* Profile */
.profile-header{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:28px;display:flex;gap:24px;align-items:flex-start;box-shadow:var(--shadow-sm)}
.profile-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-info{flex:1}
.profile-name{font-size:24px;font-weight:800;color:var(--gray-800)}
.profile-role-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:2px 10px;border-radius:20px;font-weight:700;margin-top:4px}
.profile-stats{display:flex;gap:24px;margin-top:12px}
.profile-stat{text-align:center}
.profile-stat-num{font-size:20px;font-weight:800;color:var(--blue)}
.profile-stat-lbl{font-size:12px;color:var(--gray-400)}
.profile-bio{font-size:14px;color:var(--gray-500);margin-top:8px}
.profile-email-row{font-size:13px;color:var(--gray-500);margin-top:6px;display:flex;align-items:center;gap:6px}
.tabs{display:flex;border-bottom:2px solid var(--gray-200);margin-bottom:16px}
.tab-btn{padding:10px 20px;border:none;background:none;font-size:14px;font-weight:600;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-content{display:none}
.tab-content.active{display:block}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:var(--white);border-radius:10px;padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:800;margin-bottom:20px;color:var(--gray-800);display:flex;align-items:center;gap:8px}
.modal-close{position:absolute;top:16px;left:16px;background:none;border:none;cursor:pointer;color:var(--gray-400);padding:4px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:var(--gray-700)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:5px}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:14px;outline:none;transition:border .15s;background:var(--white)}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,89,169,.1)}
.form-textarea{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:14px;outline:none;resize:vertical;min-height:80px;transition:border .15s}
.form-textarea:focus{border-color:var(--blue)}
.form-error{font-size:13px;color:var(--red);margin-top:6px;display:none}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.toggle-label{font-size:14px;color:var(--gray-700);font-weight:500}
.toggle-desc{font-size:12px;color:var(--gray-400);margin-top:2px}
.toggle{position:relative;width:40px;height:22px;display:inline-block}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--gray-300);border-radius:22px;transition:.2s}
.toggle-slider:before{content:"";position:absolute;width:16px;height:16px;right:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked + .toggle-slider{background:var(--blue)}
.toggle input:checked + .toggle-slider:before{transform:translateX(-18px)}
.user-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--gray-100);transition:background .1s}
.user-item:last-child{border-bottom:none}
.user-item:hover{background:var(--gray-50)}
.user-name{font-weight:600;color:var(--gray-800)}
.user-rep{font-size:13px;color:var(--gray-500)}
.user-banned{opacity:.5}
.create-topic-form{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-sm)}
.create-topic-form h2{font-size:18px;font-weight:800;margin-bottom:20px;color:var(--gray-800);display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.search-results{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.search-result-item{padding:14px 20px;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:background .1s}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:var(--gray-50)}
.search-result-title{font-weight:600;color:var(--gray-800);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.search-result-meta{font-size:12px;color:var(--gray-400)}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-400)}
.empty-icon{margin-bottom:12px;display:flex;justify-content:center;color:var(--gray-300)}
.empty-text{font-size:15px}
.toast-container{position:fixed;bottom:24px;left:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius);font-size:14px;font-weight:500;color:#fff;box-shadow:var(--shadow);animation:slideUp .2s ease;display:flex;align-items:center;gap:8px;max-width:320px}
.toast-success{background:#27ae60}
.toast-error{background:var(--red)}
.toast-info{background:var(--blue)}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--gray-400);gap:10px}
.spinner{width:22px;height:22px;border:2px solid var(--gray-200);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.topic-header-box{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow-sm)}
.topic-header-title{font-size:22px;font-weight:800;color:var(--gray-800);margin-bottom:8px}
.topic-header-meta{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--gray-500);flex-wrap:wrap}
.topic-admin-bar{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-100)}
/* Image lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:4px}
@media(max-width:768px){.post-sidebar{width:100px;min-width:100px}.forum-grid{grid-template-columns:1fr}.cat-meta{display:none}.topbar-search{display:none}}
</style>
</head>
<body>
<div class="app">

<script>
const API_BASE = "https://woww.pythonanywhere.com";
const GOOGLE_CLIENT_ID = "1087997271039-b8l9oi9mcut6vkp9trdmobgm78fgolme.apps.googleusercontent.com";
const IMGUR_CLIENT_ID = "546c25a59c58ad7"; // Imgur anonymous upload

let currentUser = null, currentPage = 'home-page';
let currentForumId = null, currentTopicId = null;
let currentCategoryId = null, currentProfileId = null;
let currentTopicPage = 1, currentForumPage = 1;
let allCategories = [], allForums = [];
let quotePostData = null, editingForumData = null, pendingGoogleData = null;

// ── INIT ──
window.onload = async () => { loadSession(); initGoogleSignIn(); await loadHome(); };

function initGoogleSignIn() {
  if (typeof google === 'undefined') { setTimeout(initGoogleSignIn, 300); return; }
  google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCredential, auto_select: false });
}
function renderGoogleButton() {
  if (typeof google === 'undefined') return;
  google.accounts.id.renderButton(document.getElementById('google-btn-container'),
    { theme: 'outline', size: 'large', locale: 'he', width: 320 });
}
async function handleGoogleCredential(response) {
  document.getElementById('login-error').style.display = 'none';
  try {
    const res = await apiPost('/auth/google', { id_token: response.credential });
    if (res.ok) {
      if (res.data.needs_username) {
        pendingGoogleData = { id_token: response.credential, name: res.data.name };
        document.getElementById('reg-google-name').textContent = res.data.name || '';
        document.getElementById('login-modal-content').style.display = 'none';
        document.getElementById('register-form').style.display = 'block';
        document.getElementById('reg-username').focus();
      } else { saveSession(res.data.token, res.data.user); closeModal('login-modal'); toast('ברוך הבא, ' + res.data.user.username + '!', 'success'); loadHome(); }
    } else showErr('login-error', res.error || 'שגיאה בכניסה');
  } catch(e) { showErr('login-error', 'שגיאת רשת'); }
}
async function doRegister() {
  if (!pendingGoogleData) return;
  const username = document.getElementById('reg-username').value.trim();
  if (!username) { showErr('reg-error', 'שם משתמש חסר'); return; }
  try {
    const res = await apiPost('/auth/google', { id_token: pendingGoogleData.id_token, username });
    if (res.ok) {
      pendingGoogleData = null;
      saveSession(res.data.token, res.data.user);
      closeModal('login-modal');
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('login-modal-content').style.display = 'block';
      toast('ברוך הבא, ' + res.data.user.username + '!', 'success'); loadHome();
    } else showErr('reg-error', res.error);
  } catch(e) { showErr('reg-error', 'שגיאת רשת'); }
}
function loadSession() {
  const token = localStorage.getItem('forum_token'), ud = localStorage.getItem('forum_user');
  if (token && ud) { try { currentUser = JSON.parse(ud); updateUserUI(); } catch(_){} }
}
function saveSession(token, user) {
  localStorage.setItem('forum_token', token);
  localStorage.setItem('forum_user', JSON.stringify(user));
  currentUser = user; updateUserUI();
}
function logout() {
  localStorage.removeItem('forum_token'); localStorage.removeItem('forum_user');
  currentUser = null;
  if (typeof google !== 'undefined') google.accounts.id.disableAutoSelect();
  updateUserUI(); goHome(); toast('התנתקת', 'info');
}
function getToken() { return localStorage.getItem('forum_token') || ''; }
function updateUserUI() {
  const li = !!currentUser;
  document.getElementById('user-topbar').style.display = li ? 'flex' : 'none';
  document.getElementById('login-btn-top').style.display = li ? 'none' : '';
  if (li) {
    const av = document.getElementById('user-topbar-avatar');
    if (currentUser.avatar_url) av.innerHTML = `<img src="${escHtml(currentUser.avatar_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    else { av.textContent = (currentUser.username||'?')[0].toUpperCase(); av.style.background = currentUser.avatar_color||'#0059a9'; }
    av.onclick = () => goMyProfile();
    document.getElementById('user-topbar-name').textContent = currentUser.username;
    document.getElementById('user-topbar-name').onclick = () => goMyProfile();
    if (isAdmin()) { document.getElementById('admin-bar-home').style.display = 'flex'; document.getElementById('admin-users-btn').style.display = 'flex'; }
  } else {
    document.getElementById('admin-bar-home').style.display = 'none';
    document.getElementById('admin-users-btn').style.display = 'none';
  }
}
function isAdmin() { return currentUser && (currentUser.is_admin === true || currentUser.is_admin === 'TRUE'); }
function showGoogleLogin() { openModal('login-modal'); setTimeout(renderGoogleButton, 50); }

// ── API ──
async function apiGet(path, params={}) {
  const qs = new URLSearchParams(params).toString();
  const url = API_BASE + path + (qs ? '?' + qs : '');
  const headers = {}; const tok = getToken(); if (tok) headers['Authorization'] = 'Bearer ' + tok;
  const res = await fetch(url, { headers }); return res.json();
}
async function apiPost(path, body={}) {
  const headers = { 'Content-Type': 'application/json' };
  const tok = getToken(); if (tok) headers['Authorization'] = 'Bearer ' + tok;
  const res = await fetch(API_BASE + path, { method: 'POST', headers, body: JSON.stringify(body) }); return res.json();
}
async function apiDelete(path) {
  const headers = {}; const tok = getToken(); if (tok) headers['Authorization'] = 'Bearer ' + tok;
  const res = await fetch(API_BASE + path, { method: 'DELETE', headers }); return res.json();
}

// ── PAGES ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById(id); if (page) page.classList.add('active');
  currentPage = id;
  if (id === 'search-page') document.getElementById('search-main-input').focus();
  if (id === 'latest-page') loadLatest();
  if (id === 'popular-page') loadPopular();
}
function goHome() { showPage('home-page'); loadHome(); }
function goMyProfile() { if (!currentUser) { showGoogleLogin(); return; } showProfilePage(currentUser.id); }

// ── HOME ──
async function loadHome() {
  const container = document.getElementById('categories-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div> טוען...</div>';
  try {
    const [catsRes, forumsRes] = await Promise.all([apiGet('/categories'), apiGet('/forums')]);
    if (!catsRes.ok) { container.innerHTML = emptyState('שגיאה בטעינה'); return; }
    allCategories = catsRes.data.categories || [];
    allForums = forumsRes.data.forums || [];
    document.getElementById('home-banners').innerHTML = `<div class="banner"><div><div class="banner-title">ברוכים הבאים לפורום TOP</div></div><div class="banner-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></div></div>`;
    if (!allCategories.length) { container.innerHTML = emptyState(isAdmin() ? 'לחץ "+ קטגוריה" להתחיל' : 'הפורום ריק כרגע'); return; }
    container.innerHTML = allCategories.map(cat => buildCategoryBlock(cat)).join('');
  } catch(e) { container.innerHTML = emptyState('שגיאת רשת'); }
}

function buildCategoryBlock(cat) {
  const forums = allForums.filter(f => f.category_id === cat.id);
  // ספור רק פורומים פעילים - הנושאים מעודכנים בזמן אמת
  const totalTopics = forums.reduce((s,f) => s + (parseInt(f.topic_count)||0), 0);
  const totalPosts  = forums.reduce((s,f) => s + (parseInt(f.post_count)||0), 0);
  const adminBtns = isAdmin() ? `
    <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();openCreateForumModal('${cat.id}')">+ פורום</button>
    <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();deleteCategory('${cat.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>` : '';
  const forumLinks = forums.map(f => `
    <div class="forum-link" onclick="showForumPage('${f.id}','${cat.id}')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span>${escHtml(f.name)}</span>
      <span class="forum-link-stats">${formatNum(f.topic_count||0)} נושאים · ${formatNum(f.post_count||0)} הודעות</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      ${isAdmin() ? `
        <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();openEditForumModal('${f.id}','${escAttr(f.name)}','${escAttr(f.description||'')}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();deleteForum('${f.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>` : ''}
    </div>`).join('');
  return `<div class="cat-block">
    <div class="cat-header">
      <div class="cat-title" style="color:${cat.color||'var(--blue)'}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>${escHtml(cat.name)}</div>
      <div class="cat-meta">
        <div class="stat-group">
          <div class="stat-box"><div class="stat-num">${formatNum(totalTopics)}</div><div class="stat-lbl">נושאים</div></div>
          <div class="stat-box"><div class="stat-num">${formatNum(totalPosts)}</div><div class="stat-lbl">הודעות</div></div>
        </div>${adminBtns}
      </div>
    </div>
    <div class="cat-body"><div class="forum-grid">${forumLinks||'<div style="color:var(--gray-400);font-size:14px;padding:8px 0">אין פורומים עדיין</div>'}</div></div>
  </div>`;
}

// ── FORUM PAGE ──
async function showForumPage(forumId, catId, page) {
  currentForumId = forumId; currentCategoryId = catId; currentForumPage = page || 1;
  showPage('forum-page');
  const forum = allForums.find(f => f.id === forumId) || {};
  const cat   = allCategories.find(c => c.id === catId)  || {};
  document.getElementById('forum-breadcrumb').innerHTML = `<span onclick="goHome()">בית</span><span class="sep">›</span><span>${escHtml(cat.name||'')}</span><span class="sep">›</span><span style="color:var(--gray-700)">${escHtml(forum.name||'')}</span>`;
  const hb = document.getElementById('forum-header-bar');
  hb.style.display = 'flex';
  document.getElementById('forum-banner-title').textContent = forum.name || '';
  document.getElementById('forum-banner-sub').textContent   = forum.description || '';
  document.getElementById('forum-stats-box').innerHTML = `<div class="stat-box"><div class="stat-num">${formatNum(forum.topic_count||0)}</div><div class="stat-lbl">נושאים</div></div>`;
  // כפתור נושא חדש רק בדף פורום
  const ntb = document.getElementById('new-topic-btn');
  ntb.style.display = currentUser ? 'flex' : 'none';
  const adminBar = document.getElementById('forum-admin-bar');
  adminBar.style.display = isAdmin() ? 'flex' : 'none';
  if (isAdmin()) adminBar.innerHTML = `<span class="admin-badge"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span><span class="admin-bar-title">ניהול:</span>
    <button class="btn btn-sm btn-secondary" onclick="openEditForumModal('${forumId}','${escAttr(forum.name||'')}','${escAttr(forum.description||'')}')">ערוך</button>
    <button class="btn btn-sm btn-danger" onclick="deleteForum('${forumId}')">מחק פורום</button>`;
  const container = document.getElementById('topics-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div> טוען נושאים...</div>';
  try {
    const res = await apiGet('/topics', { forum_id: forumId, page: currentForumPage });
    if (!res.ok) { container.innerHTML = emptyState('שגיאה'); return; }
    const { topics, pages } = res.data;
    if (!topics.length) { container.innerHTML = emptyState('אין נושאים עדיין. היה הראשון!'); }
    else {
      container.innerHTML = `<table class="topics-table"><thead><tr><th>נושא</th><th style="text-align:center">תגובות</th><th style="text-align:center">צפיות</th><th>פוסט אחרון</th></tr></thead><tbody>${topics.map((t,i)=>buildTopicRow(t,i)).join('')}</tbody></table>`;
    }
    buildPagination('topics-pagination', currentForumPage, pages, p => showForumPage(forumId, catId, p));
  } catch(e) { container.innerHTML = emptyState('שגיאת רשת'); }
}

function buildTopicRow(t, i) {
  const pinned = t.is_pinned === true || t.is_pinned === 'TRUE';
  const locked = t.is_locked === true || t.is_locked === 'TRUE';
  const badges = [
    pinned ? `<span class="topic-badge badge-pinned">מוצמד</span>` : '',
    locked ? `<span class="topic-badge badge-locked">נעול</span>` : '',
    i < 3  ? `<span class="topic-badge badge-new">חדש</span>` : ''
  ].join('');
  return `<tr><td><div class="topic-title-cell">
    <span class="topic-title-link" onclick="showTopicPage('${t.id}')">${escHtml(t.title)}</span>
    <div class="topic-badges">${badges}</div>
    <div class="topic-meta">פתח: ${escHtml(t.author_name||'')} · ${formatDate(t.created)}</div>
  </div></td>
  <td class="topic-stat">${formatNum(t.reply_count||0)}</td>
  <td class="topic-stat">${formatNum(t.view_count||0)}</td>
  <td class="topic-last">${formatDate(t.last_post)}</td></tr>`;
}

// ── TOPIC PAGE ──
async function showTopicPage(topicId, page) {
  currentTopicId = topicId; currentTopicPage = page || 1;
  showPage('topic-page');
  document.getElementById('topic-header').innerHTML = '<div class="loading"><div class="spinner"></div> טוען...</div>';
  document.getElementById('posts-container').innerHTML = '';
  try {
    const res = await apiGet(`/topics/${topicId}`, { page: currentTopicPage });
    if (!res.ok) { document.getElementById('topic-header').innerHTML = emptyState('שגיאה'); return; }
    const { topic, posts, pages } = res.data;
    const forum = allForums.find(f => f.id === topic.forum_id) || {};
    const cat   = allCategories.find(c => c.id === forum.category_id) || {};
    document.getElementById('topic-breadcrumb').innerHTML = `<span onclick="goHome()">בית</span><span class="sep">›</span><span onclick="showForumPage('${forum.id}','${cat.id}')">${escHtml(cat.name||'')}</span><span class="sep">›</span><span onclick="showForumPage('${forum.id}','${cat.id}')">${escHtml(forum.name||'')}</span><span class="sep">›</span><span style="color:var(--gray-700)">${escHtml(topic.title)}</span>`;
    const adminBtns = isAdmin() ? `<div class="topic-admin-bar">
      <button class="btn btn-sm btn-secondary" onclick="adminPinTopic('${topicId}')">${topic.is_pinned?'בטל הצמדה':'הצמד'}</button>
      <button class="btn btn-sm btn-secondary" onclick="adminLockTopic('${topicId}')">${topic.is_locked?'בטל נעילה':'נעל'}</button>
      <button class="btn btn-sm btn-danger" onclick="adminDeleteTopic('${topicId}')">מחק נושא</button>
    </div>` : '';
    document.getElementById('topic-header').innerHTML = `<div class="topic-header-box">
      <div class="topic-header-title">${escHtml(topic.title)}</div>
      <div class="topic-header-meta">
        <span>${formatNum(topic.reply_count||0)} תגובות</span>
        <span>${formatNum(topic.view_count||0)} צפיות</span>
      </div>${adminBtns}</div>`;
    document.getElementById('posts-container').innerHTML = posts.map((p,i) => buildPost(p, i, topic)).join('');
    buildPagination('posts-pagination', currentTopicPage, pages, pg => showTopicPage(topicId, pg));
    buildReplyBox(topic);

    document.querySelectorAll('.post-content img').forEach(img => {
      img.onclick = () => openLightbox(img.src);
    });
    // Spoiler toggle
    document.querySelectorAll('.spoiler').forEach(el => {
      el.onclick = () => el.classList.toggle('revealed');
    });
  } catch(e) { document.getElementById('topic-header').innerHTML = emptyState('שגיאת רשת'); }
}

function renderContent(raw) {
  // Parse simple markup: **bold**, *italic*, __underline__, ~~strike~~, ---hr, [spoiler]...[/spoiler], ![](url)
  let html = escHtml(raw);
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/__(.+?)__/g, '<u>$1</u>');
  html = html.replace(/~~(.+?)~~/g, '<s>$1</s>');
  html = html.replace(/^---$/gm, '<hr>');
  html = html.replace(/\[spoiler\]([\s\S]*?)\[\/spoiler\]/gi, '<span class="spoiler">$1</span>');
  // Images: ![alt](url)
  html = html.replace(/!\[([^\]]*)\]\((https?:\/\/[^\)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function buildPost(p, index, topic) {
  const isLocked = topic.is_locked === true || topic.is_locked === 'TRUE';
  const avatarHtml = p.author_avatar_url
    ? `<img src="${escHtml(p.author_avatar_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    : `<span>${(p.author_name||'?')[0].toUpperCase()}</span>`;
  const quoteHtml = p.quoted_post ? `<div class="post-quote">
    <div class="post-quote-author"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg> ${escHtml(p.quoted_post.author)}</div>
    <div class="post-quote-text">${p.quoted_post.is_deleted ? '[נמחק]' : escHtml(p.quoted_post.content.substring(0,200))}</div>
  </div>` : '';
  const contentHtml = p.is_deleted
    ? `<div class="post-deleted">${escHtml(p.content)}</div>`
    : `${quoteHtml}<div class="post-content">${renderContent(p.content)}</div>`;
  const myReact = p.my_reaction;
  const canReact = currentUser && currentUser.id !== p.author_id;
  const canEdit  = currentUser && (currentUser.id === p.author_id || isAdmin()) && !p.is_deleted;
  const canDel   = currentUser && (currentUser.id === p.author_id || isAdmin()) && !p.is_deleted;
  const footer = !p.is_deleted ? `<div class="post-footer">
    ${p.edited ? `<span class="post-edited">נערך ${formatDate(p.edited)}</span>` : ''}
    ${canReact ? `
      <button class="react-btn ${myReact==='like'?'liked':''}" onclick="doReact('${p.id}','like')"><svg width="13" height="13" viewBox="0 0 24 24" fill="${myReact==='like'?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg> ${formatNum(p.likes||0)}</button>
      <button class="react-btn ${myReact==='dislike'?'disliked':''}" onclick="doReact('${p.id}','dislike')"><svg width="13" height="13" viewBox="0 0 24 24" fill="${myReact==='dislike'?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0122 4v7a2.31 2.31 0 01-2.33 2H17"/></svg> ${formatNum(p.dislikes||0)}</button>`
    : `<span style="font-size:13px;color:var(--gray-400)">${formatNum(p.likes||0)} לייקים · ${formatNum(p.dislikes||0)} דיסלייקים</span>`}
    ${!isLocked && currentUser ? `<button class="action-btn" onclick="setQuote('${p.id}','${escAttr(p.author_name)}','${escAttr(p.content)}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg> ציטוט</button>` : ''}
    ${canEdit ? `<button class="action-btn" onclick="openEditPost('${p.id}','${escAttr(p.content)}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>` : ''}
    ${canDel ? `<button class="action-btn" style="color:var(--red)" onclick="doDeletePost('${p.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>` : ''}
    ${isAdmin() && !p.is_deleted && currentUser.id !== p.author_id ? `<button class="action-btn" style="color:var(--red)" onclick="doBanUser('${p.author_id}')">חסום</button>` : ''}
  </div>` : '';
  return `<div class="post" id="post-${p.id}">
    <div class="post-sidebar">
      <div class="post-avatar" style="background:${p.author_color||'#666'}">${avatarHtml}</div>
      <div class="post-username" onclick="showProfilePage('${p.author_id}')">${escHtml(p.author_name||'')}</div>
      <div class="post-role ${p.author_is_admin?'role-admin':'role-member'}">${p.author_is_admin?'מנהל':'חבר'}</div>
      <div class="post-rep"><strong>${formatNum(p.author_reputation||0)}</strong> מוניטין</div>
      <div class="post-count">${formatNum(p.author_post_count||0)} הודעות</div>
    </div>
    <div class="post-body">
      <div class="post-header"><span class="post-time">${formatDate(p.created)}</span><span class="post-number">#${(currentTopicPage-1)*15+index+1}</span></div>
      ${contentHtml}${footer}
    </div>
  </div>`;
}

// ── EDITOR ──
function buildEditor(id, initialValue='', minHeight='120px') {
  return `<div class="editor-wrap">
    <div class="editor-toolbar">
      <button type="button" class="toolbar-btn" title="הדגשה" onclick="editorFormat('${id}','bold')"><strong>B</strong></button>
      <button type="button" class="toolbar-btn" title="נטוי" onclick="editorFormat('${id}','italic')"><em>I</em></button>
      <button type="button" class="toolbar-btn" title="קו תחתון" onclick="editorFormat('${id}','underline')"><u>U</u></button>
      <button type="button" class="toolbar-btn" title="קו חוצה" onclick="editorFormat('${id}','strike')"><s>S</s></button>
      <span class="toolbar-sep"></span>
      <button type="button" class="toolbar-btn" title="קו מפריד" onclick="editorFormat('${id}','hr')" style="font-size:16px">—</button>
      <button type="button" class="toolbar-btn" title="ספוילר" onclick="editorFormat('${id}','spoiler')" style="font-size:11px;width:auto;padding:0 6px">ספוילר</button>
    </div>
    <textarea id="${id}" class="editor-area" style="min-height:${minHeight}" placeholder="כתוב כאן...&#10;&#10;עיצוב: **מודגש** *נטוי* __קו תחתון__ ~~קו חוצה~~&#10;תמונה: ![](URL) או העלה מטה">${escHtml(initialValue)}</textarea>
    <div class="editor-footer">
      <label class="img-upload-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        צרף תמונה
        <input type="file" accept="image/*" onchange="uploadImage(this,'${id}')">
      </label>
      <span id="upload-progress-${id}" class="upload-progress"></span>
    </div>
  </div>`;
}

function editorFormat(id, fmt) {
  const ta = document.getElementById(id);
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.substring(start, end);
  const before = ta.value.substring(0, start), after = ta.value.substring(end);
  let insert = '';
  if (fmt === 'bold')      insert = `**${sel||'טקסט'}**`;
  else if (fmt === 'italic')    insert = `*${sel||'טקסט'}*`;
  else if (fmt === 'underline') insert = `__${sel||'טקסט'}__`;
  else if (fmt === 'strike')    insert = `~~${sel||'טקסט'}~~`;
  else if (fmt === 'hr')        insert = `\n---\n`;
  else if (fmt === 'spoiler')   insert = `[spoiler]${sel||'טקסט מוסתר'}[/spoiler]`;
  ta.value = before + insert + after;
  ta.focus();
  const newPos = start + insert.length;
  ta.setSelectionRange(newPos, newPos);
}

async function uploadImage(input, editorId) {
  const file = input.files[0]; if (!file) return;
  const prog = document.getElementById('upload-progress-' + editorId);
  prog.textContent = 'מעלה...';
  try {
    const formData = new FormData(); formData.append('image', file);
    const res = await fetch('https://api.imgur.com/3/image', {
      method: 'POST',
      headers: { Authorization: 'Client-ID ' + IMGUR_CLIENT_ID },
      body: formData
    });
    const data = await res.json();
    if (data.success) {
      const url = data.data.link;
      const ta = document.getElementById(editorId);
      const pos = ta.selectionStart;
      ta.value = ta.value.substring(0, pos) + `![](${url})` + ta.value.substring(pos);
      prog.textContent = 'הועלה!';
      setTimeout(() => prog.textContent = '', 2000);
    } else { prog.textContent = 'שגיאת העלאה'; setTimeout(() => prog.textContent = '', 3000); }
  } catch(e) { prog.textContent = 'שגיאת רשת'; setTimeout(() => prog.textContent = '', 3000); }
  input.value = '';
}

function openLightbox(src) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<img src="${escHtml(src)}">`;
  lb.onclick = () => lb.remove();
  document.body.appendChild(lb);
}

function buildReplyBox(topic) {
  const isLocked = topic.is_locked === true || topic.is_locked === 'TRUE';
  const container = document.getElementById('reply-box-container');
  if (!currentUser) {
    container.innerHTML = `<div class="reply-box" style="text-align:center"><button class="btn btn-primary" onclick="showGoogleLogin()">כנס עם Google כדי להגיב</button></div>`;
    return;
  }
  if (isLocked && !isAdmin()) {
    container.innerHTML = `<div class="reply-box"><div style="color:var(--gray-500);font-size:14px">הנושא נעול</div></div>`;
    return;
  }
  container.innerHTML = `<div class="reply-box">
    <div class="reply-box-title"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> תגובה חדשה</div>
    <div id="quote-preview-container"></div>
    ${buildEditor('reply-content','','120px')}
    <div class="reply-actions"><button class="btn btn-primary" onclick="submitReply()">שלח תגובה</button></div>
  </div>`;
}

// ── CREATE TOPIC ──
function showCreateTopic() {
  if (!currentUser) { showGoogleLogin(); return; }
  if (!currentForumId) { toast('בחר פורום קודם', 'error'); return; }

function switchTab(tabId, btn) {

}

// ── PAGINATION ──
function buildPagination(containerId, current, total, onClick) {
  const el = document.getElementById(containerId);
  if (!el || total <= 1) { if (el) el.innerHTML = ''; return; }
  let html = `<button class="page-btn" ${current===1?'disabled':''} onclick="(${onClick.toString()})(${current-1})">›</button>`;
  for (let i = 1; i <= total; i++) {
    if (total > 7 && Math.abs(i - current) > 2 && i !== 1 && i !== total) {
      if (i === 2 || i === total - 1) html += '<span style="padding:0 4px;color:var(--gray-400)">...</span>';
      continue;
    }
    html += `<button class="page-btn ${i===current?'active':''}" onclick="(${onClick.toString()})(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" ${current===total?'disabled':''} onclick="(${onClick.toString()})(${current+1})">‹</button>`;
  el.innerHTML = html;
}

// ── MODAL ──
function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.body.style.overflow='hidden'; }

document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if (e.target===o) closeModal(o.id); }));

// ── TOAST ──
function toast(msg, type='info') {
  const c = document.getElementById('toast-container'), t = document.createElement('div');
  t.className = `toast toast-${type}`;
  const icons = { success:'✓', error:'✕', info:'i' };
  t.textContent = (icons[type]||'') + ' ' + msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 3000);
}

// ── HELPERS ──
function showErr(id, msg) { const el=document.getElementById(id); if(el){el.textContent=msg;el.style.display='block';} }
function emptyState(text) { return `<div class="empty-state"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div><div class="empty-text">${escHtml(text)}</div></div>`; }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;'); }
function escAttr(s) { return String(s||'').replace(/'/g,"\\'").replace(/\n/g,' ').substring(0,200); }
function formatNum(n) { n=parseInt(n)||0; if(n>=1000000)return(n/1000000).toFixed(1)+'M'; if(n>=1000)return(n/1000).toFixed(1)+'k'; return n.toString(); }
function formatDate(d) {
  if (!d) return '';
  const date=new Date(d), diff=Math.floor((new Date()-date)/1000);
  if(diff<60)return'לפני '+diff+' שניות';
  if(diff<3600)return'לפני '+Math.floor(diff/60)+' דקות';
  if(diff<86400)return'לפני '+Math.floor(diff/3600)+' שעות';
  if(diff<604800)return'לפני '+Math.floor(diff/86400)+' ימים';
  return date.toLocaleDateString('he-IL');
}
